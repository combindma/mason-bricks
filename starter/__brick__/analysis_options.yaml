include: package:flutter_lints/flutter.yaml

plugins:
  riverpod_lint:
    version: ^3.1.0
    diagnostics:
      # Enable the riverpod rules you want; they are off by default.
      # Only include rules that apply to manual declarations,
      # annotation-only rules (scoped_providers_...) won't fire here.
      provider_dependencies: true
      avoid_ref_inside_state_dispose: true

analyzer:
  errors:
    invalid_annotation_target: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"

linter:
  rules:
    avoid_dynamic_calls: true
    cancel_subscriptions: true
    close_sinks: true